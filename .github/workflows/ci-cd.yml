name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

      - name: Install frontend dependencies
        run: npm ci --prefix client

      - name: Run frontend tests
        run: npm test --prefix client

      - name: Build frontend
        run: npm run build --prefix client

  deploy-heroku:
    name: Deploy app to Heroku
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Heroku secrets
        run: |
          test -n "${{ secrets.HEROKU_API_KEY }}"
          test -n "${{ secrets.HEROKU_APP_NAME }}"
          test -n "${{ secrets.HEROKU_EMAIL }}"

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy app to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          heroku apps:info --app "$HEROKU_APP_NAME"
          git remote remove heroku 2>/dev/null || true
          git remote add heroku "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git"
          git push heroku HEAD:main --force

      - name: Verify Heroku healthcheck
        env:
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          sleep 10
          curl --fail --retry 6 --retry-delay 10 --retry-all-errors "https://${HEROKU_APP_NAME}.herokuapp.com/health" | grep -q "ok"
